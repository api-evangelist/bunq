specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Bunq
providerId: bunq
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Fintech
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for bunq: API access is bundled with bunq personal/business account
  subscriptions (Free, Core, Pro, Elite) rather than billed per request. Cost shape is therefore a tiered
  monthly subscription per account/seat with bank-product fee schedules layered on top.'
sources:
  - https://www.bunq.com/pricing
  - https://www.bunq.com/business-pricing
  - https://doc.bunq.com/
  - https://doc.bunq.com/basics/rate-limits.md
  - https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: bunq B.V.
serviceCategory: Banking / Fintech
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: EUR
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: bunq API
  ServiceCategory: Banking / Fintech
  ProviderName: bunq
  PublisherName: bunq B.V.
  InvoiceIssuerName: bunq B.V.
  BillingCurrency: EUR
  ChargeCategory: Purchase
meters:
  - name: account_subscription
    description: Monthly subscription fee for the bunq account tier (Free, Core, Pro, Elite) that grants
      API access.
    unit: month
    aggregation: sum
    dimensions:
      - tier
      - account_type
      - country
  - name: api_requests
    description: Count of API requests made against the bunq production API. Not directly billed but tracked
      for fair-use, throttling and capacity reporting.
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - http_method
      - tier
  - name: card_transactions
    description: Card payments processed against the underlying bunq account; some operations carry per-transaction
      fees per the bunq pricing PDF.
    unit: transaction
    aggregation: sum
    dimensions:
      - card_brand
      - currency
      - country
  - name: fx_conversions
    description: Foreign-exchange conversions on payments and transfers. Carries a per-conversion fee per
      the bunq pricing PDF.
    unit: transaction
    aggregation: sum
    dimensions:
      - source_currency
      - target_currency
  - name: atm_withdrawals
    description: ATM cash withdrawals; free up to a monthly cap per tier, then per-withdrawal fee applies.
    unit: transaction
    aggregation: sum
    dimensions:
      - tier
      - country
principles:
  - name: Visibility
    description: Use the bunq mobile/web app statements and the User Invoice API to see monthly subscription
      charges and per-transaction fees. The Monetary Account API exposes per-account ledgers usable for
      back-office reconciliation.
  - name: Allocation
    description: Allocate spend by sub-account (each bunq account supports multiple Monetary Accounts)
      and by API key / OAuth client to attribute API-driven flows back to the consuming team or product.
  - name: Optimization
    description: Right-size the bunq tier (Free / Core / Pro / Elite) to expected ATM withdrawal volume
      and feature use; reuse session tokens to avoid the strict /session-server throttle; batch payments
      when possible to reduce per-transaction FX fees.
  - name: Accountability
    description: Designate a finance owner per bunq business account; reconcile monthly invoices against
      the User Invoice API and tag outflows with the consuming product so chargeback / showback is possible.
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
