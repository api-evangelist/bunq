specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bunq
providerId: bunq
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Banking
  - Fintech
  - Open Banking
  - PSD2
description: 'Bunq is a European neobank whose public API access is bundled with bunq personal and business
  accounts (Free, Core, Pro, Elite) rather than sold as a separate developer plan. The pricing page is
  served only as a downloadable PDF, so per-tier monthly fees are not enumerated here. Sandbox access
  is open and free; production API access requires a bunq account in the corresponding tier. PSD2 / Open
  Banking access for licensed third-party providers is available via a separate registration path. The
  rate ceilings on this artifact reflect the documented per-IP / per-endpoint API throttle, not a paid
  quota.'
sources:
  - https://www.bunq.com/pricing
  - https://www.bunq.com/business-pricing
  - https://doc.bunq.com/
  - https://doc.bunq.com/basics/rate-limits.md
notes: |
  bunq does not publish a dedicated API pricing schedule. Personal/business account plans (Free, Core,
  Pro, Elite) are described in a downloadable PDF. The plans below mirror bunq's published tier names
  with `price: 'see vendor pricing PDF'` so consumers can iterate the structure without fabricated fees.
plans:
  - id: bunq-sandbox
    name: Sandbox
    type: freemium
    description: Free public sandbox environment for evaluating the bunq API. No bunq account required;
      sandbox users are auto-provisioned. Subject to the documented per-IP / per-endpoint throttle.
    entries:
      - label: Sandbox API Access
        name: sandbox_api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Auto-provisioned Sandbox User
      - name: Full API Surface (test data)
      - name: Community Support
  - id: bunq-free
    name: bunq Free
    type: subscription
    description: Entry-level personal account that includes API access against production once the user
      identifies. Pricing is published in the bunq pricing PDF.
    entries:
      - label: Production API Access (bundled with account)
        name: production_api_access
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: EU
        unit: 1
        price: see vendor pricing PDF
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Personal Account
  - id: bunq-core
    name: bunq Core
    type: subscription
    description: Mid-tier personal account. API access bundled with the account; see bunq pricing PDF
      for monthly fee.
    entries:
      - label: Account Subscription
        name: account_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: EU
        unit: 1
        price: see vendor pricing PDF
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Multiple Sub-accounts
      - name: Personal Card
  - id: bunq-pro
    name: bunq Pro
    type: subscription
    description: Higher-tier personal account. API access bundled with the account; see bunq pricing PDF
      for monthly fee.
    entries:
      - label: Account Subscription
        name: account_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: EU
        unit: 1
        price: see vendor pricing PDF
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Travel Insurance
      - name: Higher Withdrawal Limits
  - id: bunq-elite
    name: bunq Elite
    type: subscription
    description: Premium personal account tier with full feature access. API access bundled with the account;
      see bunq pricing PDF for monthly fee.
    entries:
      - label: Account Subscription
        name: account_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: EU
        unit: 1
        price: see vendor pricing PDF
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Premium Insurance
      - name: Metal Card
  - id: bunq-business
    name: bunq Business
    type: subscription
    description: Business account family (Free / Core / Pro / Elite) for sole proprietors and SMEs. Includes
      production API access. See bunq business pricing PDF for monthly fees.
    entries:
      - label: Business Account Subscription
        name: business_subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: EU
        unit: 1
        price: see vendor pricing PDF
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Business IBAN
      - name: Multi-currency Support
  - id: bunq-psd2-tpp
    name: PSD2 Third-Party Provider
    type: enterprise
    description: Regulated PSD2 access for licensed AISP / PISP / CBPII third-party providers. Requires
      eIDAS QWAC / QSeal certificates and registration with bunq. Pricing is governed by the PSD2 framework
      (typically free of charge for regulated TPPs).
    entries:
      - label: PSD2 API Access
        name: psd2_api_access
        type: flat
        metric: request
        limit: -1
        timeFrame: usage
        geo: EU
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Account Information Service (AIS)
      - name: Payment Initiation Service (PIS)
      - name: Confirmation of Funds (CBPII)
      - name: eIDAS Certificate Authentication
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
