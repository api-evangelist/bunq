        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://public-api.sandbox.bunq.com/
        unit: 1000
        price: TBD
        userMultiplied: false
