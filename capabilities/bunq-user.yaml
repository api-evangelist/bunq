    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: GET
        name: listalluser
        description: Get a collection of all available users.
        call: bunq-user.listalluser
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/{itemid}
      name: user-itemid
      description: REST surface for user-itemId.
      operations:
      - method: GET
        name: readuser
        description: Get a specific user.
        call: bunq-user.readuser
        with:
          itemId: rest.itemId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/{userid}/additional-transaction-information-category
      name: user-userid-additional-transaction-information-category
      description: REST surface for user-userID-additional-transaction-information-category.
      operations:
      - method: GET
        name: listalladditionaltransactioninformationcategoryforuser
        description: Get the available categories.
        call: bunq-user.listalladditionaltransactioninformationcategoryforuser
        with:
          userID: rest.userID
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/{userid}/additional-transaction-information-category-user-defined
      name: user-userid-additional-transaction-information-category-user-defined
      description: REST surface for user-userID-additional-transaction-information-category-user-defined.
      operations:
      - method: POST
        name: createadditionaltransactioninformationcategoryuserdefinedforuser
        description: Manage user-defined categories.
