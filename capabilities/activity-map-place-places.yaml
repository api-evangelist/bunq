naftiko: 1.0.0-alpha2
info:
  label: Bunq Activity Map Place API — Places
  description: 'Bunq Activity Map Place API — Places. 1 operations. Lead operation: Places. Self-contained Naftiko capability
    covering one Bunq business surface.'
  tags:
  - Bunq
  - Places
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BUNQ_API_KEY: BUNQ_API_KEY
capability:
  consumes:
  - type: http
    namespace: activity-map-place-places
    baseUri: https://public-api.sandbox.bunq.com/{basePath}
    description: Bunq Activity Map Place API — Places business capability. Self-contained, no shared references.
    resources:
    - name: activity-map-place-public-itemId
      path: /activity-map-place-public/{itemId}
      operations:
      - name: readactivitymapplacepublic
        method: GET
        description: Public endpoint for getting the place info.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: itemId
          in: path
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: activity-map-place-places-rest
    port: 8080
    description: REST adapter for Bunq Activity Map Place API — Places. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activity-map-place-public/{itemid}
      name: activity-map-place-public-itemid
      description: REST surface for activity-map-place-public-itemId.
      operations:
      - method: GET
        name: readactivitymapplacepublic
        description: Public endpoint for getting the place info.
        call: activity-map-place-places.readactivitymapplacepublic
        with:
          itemId: rest.itemId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: activity-map-place-places-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bunq Activity Map Place API — Places. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: public-endpoint-getting-place-info
      description: Public endpoint for getting the place info.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: activity-map-place-places.readactivitymapplacepublic
      with:
        itemId: tools.itemId
      outputParameters:
      - type: object
        mapping: $.
