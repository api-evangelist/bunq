    resources:
    - path: /v1/user/{userid}/limit
      name: user-userid-limit
      description: REST surface for user-userID-limit.
      operations:
      - method: GET
        name: listalllimitforuser
        description: Get all limits for the authenticated user.
        call: user-userid-limit-user.listalllimitforuser
        with:
          userID: rest.userID
        outputParameters:
        - type: object
          mapping: $.
