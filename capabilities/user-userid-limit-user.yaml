    namespace: user-userid-limit-user-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bunq user/{userID}/limit — User. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-all-limits-authenticated-user
      description: Get all limits for the authenticated user.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: user-userid-limit-user.listalllimitforuser
      with:
        userID: tools.userID
      outputParameters:
      - type: object
        mapping: $.
