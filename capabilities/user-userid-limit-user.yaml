naftiko: 1.0.0-alpha2
info:
  label: Bunq user/{userID}/limit — User
  description: 'Bunq user/{userID}/limit — User. 1 operations. Lead operation: User. Self-contained Naftiko capability covering
    one Bunq business surface.'
  tags:
  - Bunq
  - User
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BUNQ_API_KEY: BUNQ_API_KEY
capability:
  consumes:
  - type: http
    namespace: user-userid-limit-user
    baseUri: https://public-api.sandbox.bunq.com/{basePath}
    description: Bunq user/{userID}/limit — User business capability. Self-contained, no shared references.
    resources:
    - name: user-userID-limit
      path: /user/{userID}/limit
      operations:
      - name: listalllimitforuser
        method: GET
        description: Get all limits for the authenticated user.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userID
          in: path
          type: integer
          required: true
  exposes:
  - type: rest
    namespace: user-userid-limit-user-rest
    port: 8080
    description: REST adapter for Bunq user/{userID}/limit — User. One Spectral-compliant resource per consumed operation,
