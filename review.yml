aid: bunq
name: bunq
review:
  question: Does bunq expose a documented public WebSocket API?
  answer: false
  date: '2026-07-12'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. bunq's real-time event surface is
    delivered by HTTP webhook callbacks and mobile push notifications, not by a
    server-push streaming transport on bunq's own API. bunq's "Callbacks
    (Webhooks)" are configured via NotificationFilterUrl resources: bunq POSTs
    a plain HTTPS request to a URL you own when an event (mutation, payment,
    card transaction, request, etc.) occurs. This is server-to-your-endpoint
    HTTP, not a WebSocket (ws:// or wss://) held open by the client, and is out
    of scope for an AsyncAPI document describing bunq's own API. The alternative
    delivery channel, NotificationFilterPush, sends events to the user's bunq
    mobile app via the platform push services, which is also not a public
    WebSocket surface.
findings:
  summary: |
    bunq does not publish a documented public WebSocket API. The bunq Public
    API is REST over HTTPS at https://api.bunq.com/v1 (sandbox
    https://public-api.sandbox.bunq.com/v1). Access requires a distinctive
    multi-step handshake - POST /installation (register a 2048-bit RSA public
    key), POST /device-server (register the API key), POST /session-server
    (open a session) - after which every request is signed with the client's
    private key (RSA, PKCS#1 v1.5, SHA-256) in the X-Bunq-Client-Signature
    header and authenticated with the session token in the
    X-Bunq-Client-Authentication header. Real-time notifications are delivered
    as HTTP webhook callbacks (NotificationFilterUrl -> your HTTPS endpoint,
    from bunq IP range 185.40.108.0/22) or as mobile push notifications
    (NotificationFilterPush). No realtime, bidirectional, or streaming
    WebSocket (ws:// or wss://) endpoint is documented anywhere in bunq's API
    reference, callbacks documentation, or SDKs as of the review date.
  openSource: |
    bunq is not open source, but it maintains official open-source client SDKs
    and documentation on GitHub (github.com/bunq), including sdk_php, sdk_java,
    sdk_python, sdk_csharp, the doc/gitbook repositories, and a Postman
    collection. These SDKs implement the installation/device/session handshake
    and request signing, and confirm the REST-plus-webhook model (no WebSocket
    client is provided).
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.bunq.com/v1
      documented: true
      note: Primary API. Sandbox base is https://public-api.sandbox.bunq.com/v1. All calls signed with X-Bunq-Client-Signature and authenticated with X-Bunq-Client-Authentication.
    - protocol: Webhook
      scheme: https
      documented: true
      note: NotificationFilterUrl callbacks. bunq POSTs event notifications to a configured HTTPS URL from IP range 185.40.108.0/22. Server-to-endpoint HTTP, not WebSocket.
    - protocol: Push
      scheme: https
      documented: true
      note: NotificationFilterPush delivers events to the user's bunq mobile app via platform push services. Not a public WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in bunq's API reference, callbacks/notification-filter docs, or official SDKs as of the review date.
  endpointsConfirmedRest:
    - POST https://api.bunq.com/v1/installation
    - POST https://api.bunq.com/v1/device-server
    - POST https://api.bunq.com/v1/session-server
    - GET  https://api.bunq.com/v1/user
    - GET  https://api.bunq.com/v1/user/{userID}
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account-bank
    - POST https://api.bunq.com/v1/user/{userID}/monetary-account-bank
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/payment
    - POST https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/payment
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/payment/{paymentID}
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/draft-payment
    - POST https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/draft-payment
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/request-inquiry
    - POST https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/request-inquiry
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/request-response
    - GET  https://api.bunq.com/v1/user/{userID}/card
    - GET  https://api.bunq.com/v1/user/{userID}/card/{cardID}
    - POST https://api.bunq.com/v1/user/{userID}/attachment-public
    - GET  https://api.bunq.com/v1/attachment-public/{attachmentPublicUUID}/content
    - POST https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/customer-statement
    - GET  https://api.bunq.com/v1/user/{userID}/monetary-account/{monetaryAccountID}/customer-statement/{customerStatementID}/content
    - GET  https://api.bunq.com/v1/user/{userID}/notification-filter-url
    - POST https://api.bunq.com/v1/user/{userID}/notification-filter-url
    - GET  https://api.bunq.com/v1/user/{userID}/notification-filter-push
    - POST https://api.bunq.com/v1/user/{userID}/notification-filter-push
  modeledNote: |
    The endpoint paths above are grounded in bunq's public documentation. The
    OpenAPI in openapi/bunq-openapi.yml is a representative subset of a very
    large API (bunq exposes hundreds of endpoints). Request/response schemas
    are simplified: the generic top-level `Response` envelope and several input
    bodies (DraftPaymentInput, etc.) are modeled rather than reproduced
    field-for-field. Nothing that would misstate the transport, auth, or base
    host was invented.
sources:
  - url: https://doc.bunq.com/
    type: Documentation
    note: API overview; REST base and object model. No WebSocket mentioned.
  - url: https://doc.bunq.com/basics/authentication
    type: Documentation
    note: Installation -> device-server -> session-server handshake.
  - url: https://doc.bunq.com/basics/signing
    type: Documentation
    note: RSA (PKCS#1 v1.5, SHA-256) request signing; X-Bunq-Client-Signature / X-Bunq-Server-Signature.
  - url: https://doc.bunq.com/basics/bunq-api-objects
    type: Documentation
    note: Core objects - User, MonetaryAccount, Payment, RequestInquiry, Card, Attachment.
  - url: https://doc.bunq.com/payment/payment
    type: APIReference
    note: Payment create/list/get paths under /monetary-account/{id}/payment.
  - url: https://doc.bunq.com/customer-statements
    type: APIReference
    note: Customer statement exports (CSV, MT940, PDF) and content download.
  - url: https://doc.bunq.com/basics/callbacks-webhooks
    type: Documentation
    note: Callbacks are plain HTTPS webhooks POSTed from bunq IP 185.40.108.0/22. Not WebSocket.
  - url: https://doc.bunq.com/notification-filter
    type: APIReference
    note: NotificationFilterUrl (webhook) and NotificationFilterPush categories. No wss:// transport.
  - url: https://doc.bunq.com/basics/rate-limits
    type: Documentation
    note: Per-endpoint rate limits; HTTP 429 on exceed.
  - url: https://github.com/bunq
    type: SourceCode
    note: Official SDKs (php/java/python/csharp) and docs; implement REST handshake + signing, no WebSocket client.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists on bunq's own API. Real-time delivery
    is HTTP webhook callbacks (NotificationFilterUrl) and mobile push
    (NotificationFilterPush), both of which are outside the scope of an
    AsyncAPI document describing bunq's API transport. No AsyncAPI document was
    created.
