aid: bunq
url: https://raw.githubusercontent.com/api-evangelist/bunq/refs/heads/main/apis.yml
name: bunq
kind: company
description: bunq is a European (Dutch) neobank offering personal and business
  accounts across the EU. Its Public API is a REST API over HTTPS
  (https://api.bunq.com/v1, sandbox https://public-api.sandbox.bunq.com/v1) that
  lets account holders and licensed third parties read accounts, initiate SEPA
  and internal payments, send and answer payment requests, manage cards, export
  statements, upload attachments, and subscribe to event callbacks. bunq uses a
  distinctive multi-step handshake - installation (register an RSA public key),
  device-server, then session-server - after which requests are RSA-signed with
  X-Bunq-Client-Signature and authenticated with a session token in
  X-Bunq-Client-Authentication.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Banking
- Neobank
- Payments
- Accounts
- SEPA
- Open Banking
- Fintech
- Europe
- Netherlands
created: '2023-11-13'
modified: '2026-07-12'
specificationVersion: '0.19'
