  - url: collections/bunq.postman_collection.json
    type: PostmanCollection
  - url: collections/bunq.opencollection.json
    type: OpenCollection
  description: Manage event callbacks by category. URL notification filters
    (notification-filter-url) POST real-time events to an HTTPS endpoint you own
    (webhooks, from bunq IP range 185.40.108.0/22); push notification filters
    deliver events to the user's bunq mobile app. Delivery is HTTP webhook and
    push - bunq does not expose a public WebSocket.
