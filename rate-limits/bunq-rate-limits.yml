specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Bunq
providerId: bunq
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Banking
  - Fintech
  - Rate Limiting
  - Throttling
description: 'Bunq applies HTTP-method-specific rate limits per IP address per endpoint across both sandbox
  and production. Limits are not differentiated by paid plan; they apply uniformly to all callers and
  are intended to protect the platform rather than bound a paid quota. The /session-server endpoint has
  a much stricter ceiling than other endpoints. When the threshold is exceeded the API returns HTTP 429.'
sources:
  - https://doc.bunq.com/basics/rate-limits.md
  - https://doc.bunq.com/
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: GET requests (general)
    scope: IP/endpoint
    metric: requests_per_3_seconds
    limit: 3
    timeFrame: second
    notes: 3 GET requests per 3 seconds per IP per endpoint.
  - name: POST requests (general)
    scope: IP/endpoint
    metric: requests_per_3_seconds
    limit: 5
    timeFrame: second
    notes: 5 POST requests per 3 seconds per IP per endpoint.
  - name: PUT requests (general)
    scope: IP/endpoint
    metric: requests_per_3_seconds
    limit: 2
    timeFrame: second
    notes: 2 PUT requests per 3 seconds per IP per endpoint.
  - name: /session-server endpoint
    scope: IP/endpoint
    metric: requests_per_30_seconds
    limit: 1
    timeFrame: second
    notes: Stricter limit on session creation. 1 request every 30 seconds per IP.
  - name: Callback URL configuration
    scope: account
    metric: callback_urls_per_category
    limit: 2
    notes: Maximum 2 callback URLs may be configured per notification category.
policies:
  - name: Per-IP / Per-Endpoint Scoping
    description: Rate limits are applied per IP address per endpoint, so each unique IP has independent
      quotas against each endpoint.
  - name: Method-Specific Thresholds
    description: GET, POST and PUT each have their own per-3-second threshold; mixing methods does not
      consume a shared quota.
  - name: 429 on Excess
    description: Exceeding any threshold returns HTTP 429 RATE LIMIT. Clients should pause and retry on
      the affected endpoint.
  - name: Session Endpoint Hardening
    description: The /session-server endpoint enforces a much stricter (1 per 30 seconds) ceiling. Reuse
      sessions rather than re-authenticating per call.
  - name: Backoff Strategy
    description: Use exponential backoff with jitter when 429 is observed. bunq does not document a Retry-After
      header so backoff intervals must be client-managed.
maintainers:
  - FN: API Evangelist
    url: http://apievangelist.com
    email: info@apievangelist.com
